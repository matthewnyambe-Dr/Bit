<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Received</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0a0f; color:#f5f0e8; font-family:'DM Sans',sans-serif; }
    @keyframes pulse-ring {
      0% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .pulse-ring {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.4);
      animation: pulse-ring 1.6s ease-out infinite;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
  <div style="max-width:440px;width:100%;text-align:center;">

    <div style="position:relative;display:inline-flex;align-items:center;
                justify-content:center;margin-bottom:32px;">
      <div class="pulse-ring"></div>
      <div style="width:72px;height:72px;border-radius:50%;
                  background:linear-gradient(135deg,#c9a84c,#b8893a);
                  display:flex;align-items:center;justify-content:center;
                  font-size:32px;position:relative;z-index:1;">✓</div>
    </div>

    <h1 style="font-family:'Playfair Display',serif;font-size:2.2rem;
               font-weight:700;letter-spacing:-0.8px;margin-bottom:12px;">
      Payment Received!
    </h1>
    <p style="color:#8a8490;line-height:1.7;margin-bottom:32px;">
      Your payment is being confirmed on the blockchain.
      Once confirmed (usually under 2 minutes), your
      <strong style="color:#f5f0e8;">Canva template link</strong>
      will be sent to your email automatically.
    </p>

    {% if order %}
    <div style="background:#12111a;border:1px solid rgba(201,168,76,0.15);
                border-radius:12px;padding:18px 24px;margin-bottom:28px;text-align:left;">
      <div style="font-size:12px;color:#8a8490;margin-bottom:4px;">Order reference</div>
      <div style="font-family:monospace;font-size:13px;color:#c9a84c;">{{ order.order_id }}</div>
    </div>
    {% endif %}

    <a href="{{ url_for('store.index') }}"
       style="display:inline-block;border:1px solid rgba(201,168,76,0.3);
              color:#c9a84c;padding:12px 28px;border-radius:10px;
              text-decoration:none;font-size:14px;font-weight:500;">
      ← Back to store
    </a>
  </div>
</body>
</html>
