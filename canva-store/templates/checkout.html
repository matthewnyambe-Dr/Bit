<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — {{ product.name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0a0f; color:#f5f0e8; font-family:'DM Sans',sans-serif; }
    h1,h2 { font-family:'Playfair Display',serif; }
    .gold { color:#c9a84c; }
    .form-input {
      background: #12111a; border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px; color: #f5f0e8; width: 100%;
      padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: #c9a84c; }
    .cta-btn {
      background: linear-gradient(135deg,#c9a84c,#b8893a);
      color: #0a0a0f; font-weight: 600; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s; width: 100%;
      padding: 16px; border-radius: 12px; font-size: 16px;
      font-family: 'DM Sans', sans-serif; letter-spacing: 0.2px;
    }
    .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 py-16">

  <div style="max-width:480px;width:100%;">
    <!-- Back -->
    <a href="{{ url_for('store.index') }}"
       style="font-size:13px;color:#8a8490;text-decoration:none;display:inline-flex;
              align-items:center;gap:6px;margin-bottom:32px;">
      ← Back to store
    </a>

    <!-- Order summary -->
    <div style="background:#12111a;border:1px solid rgba(201,168,76,0.15);
                border-radius:16px;padding:24px;margin-bottom:28px;">
      <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
                  color:#8a8490;margin-bottom:8px;">You're buying</div>
      <div style="font-size:1.2rem;font-family:'Playfair Display',serif;font-weight:700;
                  margin-bottom:4px;">{{ product.name }}</div>
      <div class="gold" style="font-size:1.5rem;font-family:'Playfair Display',serif;
                                font-weight:900;">${{ "%.2f"|format(product.price_usd) }}</div>
      <div style="font-size:12px;color:#8a8490;margin-top:4px;">Paid in crypto via Oxapay</div>
    </div>

    <!-- Error -->
    {% if error %}
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
                border-radius:10px;padding:12px 16px;margin-bottom:20px;
                color:#fca5a5;font-size:14px;">
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <h1 style="font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;">
      Enter your details
    </h1>
    <p style="color:#8a8490;font-size:14px;margin-bottom:28px;">
      Your Canva link will be emailed here after payment confirms.
    </p>

    <form method="POST">
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;font-weight:500;margin-bottom:8px;
                      color:#c5bfb5;">Name (optional)</label>
        <input type="text" name="name" class="form-input" placeholder="Your name">
      </div>
      <div style="margin-bottom:28px;">
        <label style="display:block;font-size:13px;font-weight:500;margin-bottom:8px;
                      color:#c5bfb5;">Email address *</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="cta-btn">
        Proceed to Crypto Payment →
      </button>
    </form>

    <p style="text-align:center;font-size:12px;color:#8a8490;margin-top:20px;line-height:1.6;">
      🔒 Your email is only used for product delivery. We don't spam.
    </p>
  </div>

</body>
</html>
